name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: |
          xcodebuild build \
            -project LunarV.xcodeproj \
            -scheme LunarV \
            -configuration Debug \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            | xcpretty

      - name: Test
        run: |
          set -o pipefail
          LOG_FILE=$(mktemp)

          if xcodebuild test \
            -project LunarV.xcodeproj \
            -scheme LunarV \
            -configuration Debug \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee "$LOG_FILE" | xcpretty; then
            exit 0
          fi

          if grep -q "not currently configured for the test action" "$LOG_FILE"; then
            echo "⚠️ Scheme LunarV chưa cấu hình Test action. Bỏ qua bước test."
            exit 0
          fi

          echo "❌ xcodebuild test failed."
          exit 1
