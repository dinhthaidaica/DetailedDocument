name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build LunarV
    runs-on: macos-26
    outputs:
      version: ${{ steps.version.outputs.version }}
      dmg_name: ${{ steps.dmg.outputs.name }}
      dmg_size: ${{ steps.dmg.outputs.size }}
      zip_name: ${{ steps.zip.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Latest Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Using Xcode at $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          xcodebuild -version

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Set marketing version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i '' "s/MARKETING_VERSION = .*;/MARKETING_VERSION = $VERSION;/g" \
            LunarV.xcodeproj/project.pbxproj
          echo "✅ Updated MARKETING_VERSION to $VERSION"

      - name: Import Code Signing Certificate
        id: certificate
        env:
          CERTIFICATES_P12: ${{ secrets.CERTIFICATES_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$CERTIFICATES_P12" ]; then
            echo "❌ Error: CERTIFICATES_P12 secret is missing."
            exit 1
          fi

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import Apple WWDR Intermediate Certificate
          curl -sL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer -o $RUNNER_TEMP/AppleWWDRCAG3.cer
          security import $RUNNER_TEMP/AppleWWDRCAG3.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security

          # Decode P12 file
          echo "$CERTIFICATES_P12" > $RUNNER_TEMP/cert_base64.txt
          python3 -c "import base64; open('$RUNNER_TEMP/certificate.p12', 'wb').write(base64.b64decode(open('$RUNNER_TEMP/cert_base64.txt', 'r').read()))"

          # Import P12
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -A

          # Add keychain to search list
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Find identity
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -o '"[^"]*"' | head -1 | tr -d '"')

          if [ -z "$IDENTITY" ]; then
            echo "❌ Error: No valid signing identity found."
            security find-identity -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi

          echo "🔐 Identity found: $IDENTITY"
          echo "identity=$IDENTITY" >> $GITHUB_OUTPUT
          echo "keychain=$KEYCHAIN_PATH" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          echo "🔐 Building with mandatory code signing..."
          echo "Identity: ${{ steps.certificate.outputs.identity }}"

          xcodebuild -project LunarV.xcodeproj -scheme LunarV \
            -configuration Release \
            -derivedDataPath ./build \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ steps.certificate.outputs.identity }}" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${{ steps.certificate.outputs.keychain }}" \
            DEVELOPMENT_TEAM="" \
            STRIP_SWIFT_SYMBOLS=NO \
            COPY_PHASE_STRIP=NO \
            STRIP_INSTALLED_PRODUCT=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            clean build \
            2>&1 | tee build.log

          if [ ! -d "./build/Build/Products/Release/LunarV.app" ]; then
            echo "❌ Build failed: LunarV.app not found"
            exit 1
          fi

          # Verify signing
          echo "🔍 Verifying code signature..."
          codesign -dv --verbose=2 "./build/Build/Products/Release/LunarV.app" 2>&1

          echo "🔍 Verifying signature validity..."
          codesign --verify --deep --strict "./build/Build/Products/Release/LunarV.app" 2>&1
          if [ $? -ne 0 ]; then
            echo "❌ Code signature verification failed!"
            exit 1
          fi
          echo "✅ Code signature is valid"

      - name: Create DMG
        id: dmg
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_PATH="./build/Build/Products/Release/LunarV.app"
          DMG_NAME="LunarV-$VERSION.dmg"

          # Remove extended attributes to prevent "damaged" error
          xattr -cr "$APP_PATH"
          echo "✅ Removed extended attributes from app"

          TEMP_DIR=$(mktemp -d)
          cp -R "$APP_PATH" "$TEMP_DIR/"
          ln -s /Applications "$TEMP_DIR/Applications"

          hdiutil create -volname "LunarV" \
            -srcfolder "$TEMP_DIR" \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            "$DMG_NAME"

          rm -rf "$TEMP_DIR"

          SIZE=$(stat -f%z "$DMG_NAME")
          echo "name=$DMG_NAME" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "✅ DMG created: $DMG_NAME ($SIZE bytes)"

      - name: Create ZIP
        id: zip
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_PATH="./build/Build/Products/Release/LunarV.app"
          ZIP_NAME="LunarV-$VERSION.zip"

          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_NAME"

          echo "name=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "✅ ZIP created: $ZIP_NAME"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: ${{ steps.dmg.outputs.name }}
          retention-days: 1

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: zip
          path: ${{ steps.zip.outputs.name }}
          retention-days: 1

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: dmg

      - name: Download ZIP
        uses: actions/download-artifact@v4
        with:
          name: zip

      - name: Generate checksums
        run: |
          sha256sum "${{ needs.build.outputs.dmg_name }}" > checksums.txt
          sha256sum "${{ needs.build.outputs.zip_name }}" >> checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: LunarV ${{ needs.build.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
          files: |
            ${{ needs.build.outputs.dmg_name }}
            ${{ needs.build.outputs.zip_name }}
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
