name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Phiên bản (ví dụ: 1.0.0)'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Release
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set marketing version
        run: |
          sed -i '' "s/MARKETING_VERSION = .*;/MARKETING_VERSION = ${{ steps.version.outputs.VERSION }};/g" \
            LunarV.xcodeproj/project.pbxproj

      - name: Build Release
        run: |
          xcodebuild archive \
            -project LunarV.xcodeproj \
            -scheme LunarV \
            -configuration Release \
            -archivePath ${{ runner.temp }}/LunarV.xcarchive \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            | xcpretty

      - name: Export app
        run: |
          mkdir -p ${{ runner.temp }}/export
          cp -R "${{ runner.temp }}/LunarV.xcarchive/Products/Applications/LunarV.app" \
            "${{ runner.temp }}/export/LunarV.app"

      - name: Create DMG
        run: |
          DMG_PATH="${{ runner.temp }}/LunarV-${{ steps.version.outputs.VERSION }}.dmg"

          # Create a temporary directory for DMG contents
          DMG_DIR="${{ runner.temp }}/dmg_contents"
          mkdir -p "$DMG_DIR"
          cp -R "${{ runner.temp }}/export/LunarV.app" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"

          # Create DMG
          hdiutil create -volname "LunarV" \
            -srcfolder "$DMG_DIR" \
            -ov -format UDZO \
            "$DMG_PATH"

          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"
          echo "DMG_NAME=LunarV-${{ steps.version.outputs.VERSION }}.dmg" >> "$GITHUB_ENV"

      - name: Create ZIP
        working-directory: ${{ runner.temp }}/export
        run: |
          ZIP_PATH="${{ runner.temp }}/LunarV-${{ steps.version.outputs.VERSION }}.zip"
          ditto -c -k --sequesterRsrc --keepParent LunarV.app "$ZIP_PATH"

          echo "ZIP_PATH=$ZIP_PATH" >> "$GITHUB_ENV"
          echo "ZIP_NAME=LunarV-${{ steps.version.outputs.VERSION }}.zip" >> "$GITHUB_ENV"

      - name: Generate checksums
        run: |
          cd ${{ runner.temp }}
          shasum -a 256 "$DMG_NAME" > checksums.txt
          shasum -a 256 "$ZIP_NAME" >> checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: LunarV ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: |
            ${{ env.DMG_PATH }}
            ${{ env.ZIP_PATH }}
            ${{ runner.temp }}/checksums.txt
