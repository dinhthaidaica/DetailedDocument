name: Release DMG

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (example: 1.2.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build LunarV DMG
    runs-on: macos-15
    outputs:
      version: ${{ steps.vars.outputs.version }}
      dmg_path: ${{ steps.build.outputs.dmg_path }}
      dmg_name: ${{ steps.build.outputs.dmg_name }}
      dmg_size: ${{ steps.build.outputs.dmg_size }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Latest Xcode
        run: |
          if compgen -G "/Applications/Xcode_*.app" > /dev/null; then
            LATEST_XCODE=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
            echo "Using Xcode at $LATEST_XCODE"
            sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          fi
          xcodebuild -version

      - name: Resolve version
        id: vars
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ -n "${INPUT_VERSION:-}" ]]; then
            VERSION="${INPUT_VERSION}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="nightly-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          fi

          SAFE_VERSION="$(echo "${VERSION}" | tr '/' '-')"
          echo "version=${SAFE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Resolved version: ${SAFE_VERSION}"

      - name: Build Release DMG
        id: build
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          XCODEBUILD_LOG: build.log
        run: ./scripts/build_release_dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: LunarV-${{ steps.vars.outputs.version }}-dmg
          path: ${{ steps.build.outputs.dmg_path }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: LunarV-build-log-${{ steps.vars.outputs.version }}
          path: build.log
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: LunarV-${{ needs.build.outputs.version }}-dmg

      - name: Create GitHub Release with DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LunarV ${{ needs.build.outputs.version }}
          files: ${{ needs.build.outputs.dmg_name }}
          generate_release_notes: true
